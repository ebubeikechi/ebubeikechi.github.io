<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Embedded Site</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Removes tiny bottom gap caused by inline elements */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbwA72mA8vGzvjhLMrIgoN3s5_hZ4tasrmJLwtWJ4Js/dev" 
        title="Full Screen Embedded Content">
    </iframe>

</body>
</html>
